# ===================
# 基础设置
# ===================

mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false

tcp-concurrent: true
unified-delay: true
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true


# ===================
# 订阅
# ===================

proxy-providers:

  airport:
    type: http
    url: "你的订阅链接"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT


# ===================
# 节点
# ===================

proxies:
  - {name: DIRECT, type: direct}


# ===================
# TUN
# ===================

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53


# ===================
# DNS
# ===================

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN


# ===================
# 策略组
# ===================

proxy-groups:

  # 自动选最快节点
  - name: AUTO
    type: url-test
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 30
    lazy: true

  # 故障自动切换
  - name: FAILOVER
    type: fallback
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300

  # 负载均衡（下载用）
  - name: BALANCE
    type: load-balance
    include-all: true
    strategy: consistent-hashing

  # 总策略
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - FAILOVER
      - BALANCE
      - DIRECT


# ===================
# 规则
# ===================

rules:

  - GEOIP,CN,DIRECT
  - MATCH,PROXY