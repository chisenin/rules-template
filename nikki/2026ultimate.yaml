########################################
# 2026 Mihomo Nikki 内核 – 完整注释版 YAML
# 功能：终极旗舰版 + GeoIP 优化 + 缓存容错
########################################

# =============================
# 1. 全局基础设置
# =============================
mixed-port: 7890              # 透明代理端口
socks-port: 7891              # SOCKS5 端口
redir-port: 7892              # REDIR 端口
tproxy-port: 7894             # TProxy 端口

allow-lan: true               # 是否允许局域网设备访问
bind-address: "*"             # 绑定网卡
mode: rule                    # 规则模式
log-level: info               # 日志级别: info/warning/error
ipv6: false                   # 是否启用 IPv6

tcp-concurrent: true          # 并发 TCP
unified-delay: true           # 统一延迟计算

keep-alive-idle: 600          # TCP Keep-Alive 空闲时间
keep-alive-interval: 15       # TCP Keep-Alive 间隔

global-client-fingerprint: chrome  # 模拟浏览器指纹
profile:
  store-selected: true        # 保存已选节点
  store-fake-ip: true         # 保存 Fake-IP

# =============================
# 2. Proxy Providers（机场订阅 + 规则集）
# =============================
proxy-providers:
  # 机场订阅示例
  airport:
    type: http
    url: "你的机场订阅链接"
    interval: 86400           # 每 24 小时更新一次
    path: ./proxies/airport.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    proxy: 直连

  # 自动规则集下载
  auto-rules:
    type: http
    url: "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/meta-rules-dat.mrs"
    interval: 86400
    behavior: classical       # 经典规则格式

# =============================
# 3. 节点列表
# =============================
proxies:
  - name: 直连
    type: direct

# =============================
# 4. TUN / 网络接管（Nikki 内核特化）
# =============================
tun:
  enable: true
  stack: mixed                # 混合模式
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53

# =============================
# 5. DNS 配置 – Fake-IP + 缓存 + Fallback
# =============================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  cache-algorithm: arc        # 高效缓存算法

  # Fake-IP 白名单
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.example"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "*.apple.com"
    - "time.windows.com"

  # 默认和上游 Nameserver
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # Fallback DNS（容错与超时）
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# =============================
# 6. GeoIP / GeoSite 缓存与 MMDB 优化
# =============================
geodata:
  cache-path: /etc/nikki/run/geodata  # 缓存路径，确保目录可写
  download-timeout: 30                 # MMDB 下载超时时间（秒）
  max-retries: 3                       # 下载失败重试次数
  auto-download: true                  # 启动时自动下载 MMDB 文件

# =============================
# 7. 核心策略组
# =============================
proxy-groups:
  # 自动测速 & 节点评分
  - name: AUTO
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 30
    lazy: true

  - name: SCORE
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 20
    lazy: true
    probe-history: 50

  - name: FAILOVER
    type: fallback
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: BALANCE
    type: load-balance
    include-all: true
    strategy: consistent-hashing

  # 国家节点分组
  - name: HK
    type: select
    include-all: true
    filter: "(?i)hk|hongkong|香港"
  - name: JP
    type: select
    include-all: true
    filter: "(?i)jp|japan|日本"
  - name: US
    type: select
    include-all: true
    filter: "(?i)us|america|unitedstates|美国"
  - name: SG
    type: select
    include-all: true
    filter: "(?i)sg|singapore|新加坡"
  - name: TW
    type: select
    include-all: true
    filter: "(?i)tw|taiwan|台湾"

  # 服务策略
  - name: AI
    type: select
    proxies:
      - SCORE
      - AUTO
      - JP
      - US
      - FAILOVER

  - name: NETFLIX
    type: select
    proxies:
      - US
      - JP
      - SG
      - AUTO

  - name: STREAM
    type: select
    proxies:
      - AUTO
      - NETFLIX
      - JP
      - US
      - SG

  - name: DOWNLOAD
    type: select
    proxies:
      - BALANCE
      - AUTO
      - FAILOVER

  - name: PROXY
    type: select
    proxies:
      - SCORE
      - AUTO
      - FAILOVER
      - HK
      - JP
      - US
      - SG
      - TW
      - 直连

# =============================
# 8. 规则部分
# =============================
rules:
  # AI / ChatGPT
  - RULE-SET,ai,AI
  - RULE-SET,openai_api,AI

  # 流媒体
  - RULE-SET,netflix,NETFLIX
  - RULE-SET,youtube,STREAM
  - RULE-SET,disneyplus,STREAM
  - RULE-SET,hbo,STREAM
  - RULE-SET,primevideo,STREAM
  - RULE-SET,roku,STREAM

  # 社交软件
  - RULE-SET,telegram,PROXY
  - RULE-SET,whatsapp,PROXY

  # 开发者网站
  - RULE-SET,github,PROXY
  - RULE-SET,stackoverflow,PROXY

  # 系统服务 & 国内流量直连
  - RULE-SET,apple,直连
  - RULE-SET,microsoft,直连
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连

  # 默认策略
  - MATCH,PROXY

# =============================
# 9. 规则集 Anchor Sources
# =============================
rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

rule-providers:
  ai:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs

  openai_api:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs

  netflix:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs

  disneyplus:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/disneyplus.mrs

  hbo:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/hbo.mrs

  primevideo:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/primevideo.mrs

  roku:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/roku.mrs

  youtube:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs

  telegram:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs

  whatsapp:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/whatsapp.mrs

  github:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs

  stackoverflow:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/stackoverflow.mrs

  apple:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs

  microsoft:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.mrs

  cn_domain:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs

  cn_ip:
    <<: *ip
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs

########################################
# End of 2026 Mihomo Nikki 内核 完整注释版
########################################
