########################################
# 2026 mihomo 终极旗舰版 – 全功能结构
########################################

# =============================
# 1. 全局基础设置
# =============================
mixed-port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7894

allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false

tcp-concurrent: true
unified-delay: true

keep-alive-idle: 600
keep-alive-interval: 15

global-client-fingerprint: chrome
profile:
  store-selected: true
  store-fake-ip: true

# =============================
# 2. 订阅 Providers
# =============================
proxy-providers:
  airport:
    type: http
    url: "机场订阅链接"
    interval: 86400
    path: ./proxies/airport.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    proxy: DIRECT

  # 自动最新规则集下载
  auto-rules:
    type: http
    url: "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/meta-rules-dat.mrs"
    interval: 86400
    behavior: classical

# =============================
# 3. 节点 Proxy 列表
# =============================
proxies:
  - name: DIRECT
    type: direct


# =============================
# 4. TUN / 网络接管
# =============================
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53


# =============================
# 5. DNS – Fake-IP + Fallback + Cache
# =============================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  cache-algorithm: arc

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.example"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "*.apple.com"
    - "time.windows.com"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

# =============================
# 6. 核心策略组
# =============================
proxy-groups:

  ##################
  # 节点智能策略
  ##################

  # 最低延迟
  - name: AUTO
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 30
    lazy: true

  # 综合评分（延迟 + 丢包 + 历史成功率）
  - name: SCORE
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 20
    lazy: true
    probe-history: 50

  # 节点健康备用
  - name: FAILOVER
    type: fallback
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  # 下载负载均衡
  - name: BALANCE
    type: load-balance
    include-all: true
    strategy: consistent-hashing

  ##################
  # 国家/区域节点分组
  ##################

  - name: HK
    type: select
    include-all: true
    filter: "(?i)hk|hongkong|香港"
  - name: JP
    type: select
    include-all: true
    filter: "(?i)jp|japan|日本"
  - name: US
    type: select
    include-all: true
    filter: "(?i)us|america|unitedstates|美国"
  - name: SG
    type: select
    include-all: true
    filter: "(?i)sg|singapore|新加坡"
  - name: TW
    type: select
    include-all: true
    filter: "(?i)tw|taiwan|台湾"

  ##################
  # 服务优化策略分组
  ##################

  # AI / OpenAI / ChatGPT
  - name: AI
    type: select
    proxies:
      - SCORE
      - AUTO
      - JP
      - US
      - FAILOVER

  # Netflix 解锁优化
  - name: NETFLIX
    type: select
    proxies:
      - US
      - JP
      - SG
      - AUTO

  # 流媒体视频
  - name: STREAM
    type: select
    proxies:
      - AUTO
      - NETFLIX
      - JP
      - US
      - SG

  # 大文件下载
  - name: DOWNLOAD
    type: select
    proxies:
      - BALANCE
      - AUTO
      - FAILOVER

  # 默认代理
  - name: PROXY
    type: select
    proxies:
      - SCORE
      - AUTO
      - FAILOVER
      - HK
      - JP
      - US
      - SG
      - TW
      - DIRECT

# =============================
# 7. 规则部分（核心规则 + 自动规则集）
# =============================
rules:

  # AI 类服务分流
  - RULE-SET,ai,AI
  - RULE-SET,openai_api,AI

  # 流媒体服务
  - RULE-SET,netflix,NETFLIX
  - RULE-SET,youtube,STREAM
  - RULE-SET,disneyplus,STREAM
  - RULE-SET,hbo,STREAM
  - RULE-SET,primevideo,STREAM
  - RULE-SET,roku,STREAM

  # 即时通讯
  - RULE-SET,telegram,PROXY
  - RULE-SET,whatsapp,PROXY

  # Dev & 社交服务
  - RULE-SET,github,PROXY
  - RULE-SET,stackoverflow,PROXY

  # 操作系统服务
  - RULE-SET,apple,DIRECT
  - RULE-SET,microsoft,DIRECT

  # DNS 相关（避免污染）
  - RULE-SET,dns_services,DIRECT

  # 国内流量直连
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT

  # 默认规则
  - MATCH,PROXY

# =============================
# 8. 规则集 Anchor Sources
# =============================
rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

rule-providers:

  # AI / ChatGPT
  ai:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs

  openai_api:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs

  # 流媒体
  netflix:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs

  disneyplus:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/disneyplus.mrs

  hbo:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/hbo.mrs

  primevideo:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/primevideo.mrs

  roku:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/roku.mrs

  youtube:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs

  # 即时通讯
  telegram:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs

  whatsapp:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/whatsapp.mrs

  # 社交+Dev
  github:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs

  stackoverflow:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/stackoverflow.mrs

  # OS 系列
  apple:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs

  microsoft:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.mrs

  # 国别直连
  cn_domain:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs

  cn_ip:
    <<: *ip
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs

# ===============
# End of Config
# ===============