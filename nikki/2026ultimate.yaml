########################################
# 2026 Mihomo 终极旗舰版
########################################

# =============================
# 1. 全局基础设置
# =============================
mixed-port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7894

allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false

tcp-concurrent: true
unified-delay: true

keep-alive-idle: 600
keep-alive-interval: 15

global-client-fingerprint: chrome
profile:
  store-selected: true
  store-fake-ip: true

# =============================
# 2. 订阅 Providers
# =============================
proxy-providers:
  airport:
    type: http
    url: "机场订阅链接"
    interval: 86400
    path: ./proxies/airport.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    proxy: 直连

  auto-rules:
    type: http
    url: "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/meta-rules-dat.mrs"
    interval: 86400
    behavior: classical

# =============================
# 3. 节点 Proxy 列表
# =============================
proxies:
  - name: 直连
    type: direct

# =============================
# 4. TUN / 网络接管
# =============================
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53

# =============================
# 5. DNS – Fake-IP + Fallback + Cache
# =============================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  cache-algorithm: arc

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.example"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "*.apple.com"
    - "time.windows.com"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

# =============================
# 6. 核心策略组
# =============================
proxy-groups:

  - name: AUTO
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 30
    lazy: true

  - name: SCORE
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 20
    lazy: true
    probe-history: 50

  - name: FAILOVER
    type: fallback
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: BALANCE
    type: load-balance
    include-all: true
    strategy: consistent-hashing

  # 国家/区域分组
  - name: HK
    type: select
    include-all: true
    filter: "(?i)hk|hongkong|香港"
  - name: JP
    type: select
    include-all: true
    filter: "(?i)jp|japan|日本"
  - name: US
    type: select
    include-all: true
    filter: "(?i)us|america|unitedstates|美国"
  - name: SG
    type: select
    include-all: true
    filter: "(?i)sg|singapore|新加坡"
  - name: TW
    type: select
    include-all: true
    filter: "(?i)tw|taiwan|台湾"

  # 服务策略
  - name: AI
    type: select
    proxies:
      - SCORE
      - AUTO
      - JP
      - US
      - FAILOVER

  - name: NETFLIX
    type: select
    proxies:
      - US
      - JP
      - SG
      - AUTO

  - name: STREAM
    type: select
    proxies:
      - AUTO
      - NETFLIX
      - JP
      - US
      - SG

  - name: DOWNLOAD
    type: select
    proxies:
      - BALANCE
      - AUTO
      - FAILOVER

  - name: PROXY
    type: select
    proxies:
      - SCORE
      - AUTO
      - FAILOVER
      - HK
      - JP
      - US
      - SG
      - TW
      - 直连

# =============================
# 7. 规则部分
# =============================
rules:

  - RULE-SET,ai,AI
  - RULE-SET,openai_api,AI

  - RULE-SET,netflix,NETFLIX
  - RULE-SET,youtube,STREAM
  - RULE-SET,disneyplus,STREAM
  - RULE-SET,hbo,STREAM
  - RULE-SET,primevideo,STREAM
  - RULE-SET,roku,STREAM

  - RULE-SET,telegram,PROXY
  - RULE-SET,whatsapp,PROXY

  - RULE-SET,github,PROXY
  - RULE-SET,stackoverflow,PROXY

  - RULE-SET,apple,直连
  - RULE-SET,microsoft,直连

  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连

  - MATCH,PROXY

# =============================
# 8. 规则集 Anchor Sources
# =============================
rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

rule-providers:

  ai:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs

  openai_api:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs

  netflix:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs

  disneyplus:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/disneyplus.mrs

  hbo:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/hbo.mrs

  primevideo:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/primevideo.mrs

  roku:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/roku.mrs

  youtube:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs

  telegram:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs

  whatsapp:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/whatsapp.mrs

  github:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs

  stackoverflow:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/stackoverflow.mrs

  apple:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs

  microsoft:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.mrs

  cn_domain:
    <<: *domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs

  cn_ip:
    <<: *ip
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs

########################################
# End of 2026 Mihomo 终极旗舰版
########################################
